<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ISE — Sistema de Administración Escolar</title>
<style>
  :root{
    --ink:#302d2f;--paper:#fff8fb;--card:#ffffff;--rose:#ec198e;--rose-dark:#bd0b6d;
    --rose-light:#fde5f2;--gold:#f0a7cc;--gold-light:#fff0f7;--sage:#6f5870;
    --sage-light:#f2eaf3;--clay:#746a70;--line:#eee3e9;--danger:#c83358;--danger-light:#fde7ed;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI Variable","Aptos","Inter",system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#fff8fb 0%,#fff 55%,#fff2f8 100%);color:var(--ink);}
  .app{display:flex;min-height:100vh;}
  .sidebar{width:252px;background:linear-gradient(180deg,#292629 0%,#383238 100%);flex-shrink:0;padding:24px 0;display:flex;flex-direction:column;box-shadow:12px 0 35px rgba(48,45,47,.08);}
  .brand{padding:0 22px 22px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:16px;}
  .brand-mark{display:flex;align-items:center;gap:13px;}
  .brand-logo{width:52px;height:64px;object-fit:contain;object-position:center;background:#fff;border-radius:12px;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,.22);}
  .brand-name{font-family:inherit;font-size:23px;font-weight:800;letter-spacing:1.8px;color:#fff;}
  .brand-sub{font-size:10px;line-height:1.35;color:rgba(255,255,255,.64);text-transform:uppercase;letter-spacing:.8px;}
  .nav{display:flex;flex-direction:column;gap:5px;padding:0 10px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;cursor:pointer;font-size:14px;color:rgba(251,247,245,.78);font-weight:550;transition:.18s ease;}
  .nav-item:hover{background:rgba(236,25,142,.13);transform:translateX(2px);}
  .nav-item.active{background:linear-gradient(90deg,rgba(236,25,142,.32),rgba(236,25,142,.08));color:#fff;box-shadow:inset 3px 0 #ec198e;font-weight:600;}
  .nav-dot{width:7px;height:7px;border-radius:50%;background:#ec198e;box-shadow:0 0 0 4px rgba(236,25,142,.12);}
  .main{flex:1;padding:38px 46px;max-width:1280px;width:100%;}
  h1.page-title{font-family:inherit;font-size:30px;font-weight:780;letter-spacing:-.5px;margin:0 0 4px 0;color:var(--ink);}
  .page-sub{color:var(--clay);font-size:14px;margin:0 0 30px 0;}
  .grid{display:grid;gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-2{grid-template-columns:1fr 1fr;}
  .metric{background:var(--card);border:1px solid rgba(48,45,47,.08);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 12px 35px rgba(48,45,47,.055);}
  .metric:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:#ec198e;}
  .metric-label{font-size:12px;color:var(--clay);text-transform:uppercase;letter-spacing:.75px;margin-bottom:8px;font-weight:700;}
  .metric-value{font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-1px;}
  .metric-value.rose{color:var(--rose-dark);}
  .metric-value.sage{color:var(--sage);}
  .card{background:var(--card);border:1px solid rgba(48,45,47,.08);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 12px 35px rgba(48,45,47,.055);}
  .card h3{margin:0 0 14px 0;font-size:15px;font-weight:700;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .search-box{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;min-width:220px;background:var(--card);border-color:#e8dce3;}
  select.filter{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--card);color:var(--ink);border-color:#e8dce3;}
  .btn{padding:9px 16px;border-radius:10px;border:1px solid var(--rose);background:linear-gradient(135deg,#ec198e,#d00d77);color:#fff;font-size:14px;cursor:pointer;font-weight:600;box-shadow:0 7px 18px rgba(236,25,142,.18);transition:.18s ease;}
  .btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(236,25,142,.25);}
  .btn.secondary{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:none;}
  .btn.secondary:hover{background:var(--paper);}
  .btn.danger{background:var(--danger);border-color:var(--danger);}
  .btn.small{padding:5px 10px;font-size:12px;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:10px 12px;color:var(--clay);font-size:12px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--line);}
  td{padding:11px 12px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  tr.clickable{cursor:pointer;}
  tr.clickable:hover{background:var(--paper);}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
  .badge.activo{background:var(--sage-light);color:var(--sage);}
  .badge.baja{background:var(--danger-light);color:var(--danger);}
  .badge.carrera{background:#f3e9ff;color:#6d3aa0;}
  .badge.diplomado{background:var(--rose-light);color:var(--rose-dark);}
  .badge.seminario{background:#e7f5ff;color:#256b96;}
  .badge.verano{background:#fff0d8;color:#9b5f07;}
  .badge.evento{background:#ece9ea;color:#4c4549;}
  .empty{padding:40px 20px;text-align:center;color:var(--clay);}
  .empty i{display:block;font-size:13px;}
  .overlay{position:fixed;inset:0;background:rgba(46,36,56,0.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--card);border-radius:20px;padding:26px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(34,28,32,.28);}
  .modal h2{font-family:Georgia,serif;font-size:19px;margin:0 0 18px 0;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--clay);margin-bottom:5px;font-weight:600;}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:var(--paper);border-color:#e8dce3;}
  .field textarea{resize:vertical;min-height:60px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--line);}
  .tab{padding:10px 16px;font-size:14px;cursor:pointer;color:var(--clay);border-bottom:2px solid transparent;}
  .tab.active{color:var(--rose-dark);border-bottom-color:var(--rose);font-weight:600;}
  .ficha-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
  .ficha-name{font-family:inherit;font-size:22px;font-weight:780;letter-spacing:-.5px;margin:0;}
  .ficha-meta{color:var(--clay);font-size:13px;margin-top:4px;}
  .back-link{color:var(--rose-dark);font-size:13px;cursor:pointer;margin-bottom:14px;display:inline-block;}
  .row-actions{display:flex;gap:8px;}
  .att-grid{display:flex;flex-direction:column;gap:8px;}
  .att-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--line);border-radius:6px;}
  .att-row span{font-size:14px;}
  .toggle{display:flex;gap:6px;}
  .toggle button{padding:5px 12px;border-radius:6px;border:1px solid var(--line);background:var(--card);font-size:12px;cursor:pointer;}
  .toggle button.on-p{background:var(--sage-light);border-color:var(--sage);color:var(--sage);}
  .toggle button.on-a{background:var(--danger-light);border-color:var(--danger);color:var(--danger);}
  .note{font-size:12px;color:var(--clay);margin-top:6px;}
  .loading{padding:60px;text-align:center;color:var(--clay);}
  .nav-divider{height:1px;background:rgba(255,255,255,.12);margin:14px 12px 10px;}
  .nav-action{margin:2px 12px;padding:8px 10px;border:1px solid rgba(255,255,255,.18);border-radius:6px;background:transparent;color:rgba(251,247,245,.8);font:inherit;font-size:12px;text-align:left;cursor:pointer;}
  .nav-action:hover{background:rgba(255,255,255,.08);color:var(--gold-light);}
  .calendar-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .calendar-filter{padding:8px 13px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--clay);cursor:pointer;font-weight:650;}
  .calendar-filter.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .calendar-list{display:grid;gap:12px;}
  .calendar-event{display:grid;grid-template-columns:150px 1fr auto;gap:18px;align-items:center;padding:16px 18px;border:1px solid var(--line);border-left:5px solid var(--event-color,#ec198e);border-radius:14px;background:#fff;}
  .calendar-date{font-weight:750;color:var(--ink);}.calendar-title{font-weight:760;font-size:15px}.calendar-meta{font-size:12px;color:var(--clay);margin-top:4px;}
  .date-range{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;background:#fff6fb;border:1px solid #f7d6e8;border-radius:12px;}
  .date-range-note{grid-column:1/-1;margin:0;color:#8a6478;font-size:12px;}
  .plan-summary{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}.plan-summary span{padding:7px 11px;background:var(--rose-light);color:var(--rose-dark);border-radius:999px;font-size:12px;font-weight:700;}.calendar-count{font-size:12px;color:var(--clay);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;}
  @media (max-width:780px){
    .app{display:block;}
    .sidebar{width:100%;padding:14px 0;}
    .brand{padding:0 16px 12px;margin-bottom:10px;}
    .brand-mark{justify-content:center;}
    .brand-sub{text-align:center;}
    .nav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));}
    .nav-divider{display:none;}
    .nav-action{margin:2px;}
    .main{padding:22px 16px;max-width:none;overflow-x:hidden;}
    .grid-4,.grid-2{grid-template-columns:1fr 1fr;}
    .card{overflow-x:auto;}
    table{min-width:620px;}
    .calendar-event{grid-template-columns:1fr;gap:8px;}
    .date-range{grid-template-columns:1fr;}
    .brand-logo{width:44px;height:52px;}
  }
  @media (max-width:480px){
    .grid-4,.grid-2{grid-template-columns:1fr;}
    .toolbar{align-items:stretch;}
    .search-box,select.filter,.toolbar .btn{width:100%;min-width:0;}
  }
</style>

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtMoney(n){ return '$' + Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function gruposSemilla(){
  return [
    { id: uid('grp'), dia:'Lunes a jueves', horario:'8:00 am - 10:00 am' },
    { id: uid('grp'), dia:'Lunes a jueves', horario:'11:00 am - 1:00 pm' },

    { id: uid('grp'), dia:'Solo sábado', horario:'2:00 pm - 6:00 pm' },
  ];
}

async function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) throw new Error('Base vacía');
    db = JSON.parse(raw);
  }catch(e){
    db = { alumnos:[], materias:[], inscripciones:[], pagos:[], grupos: gruposSemilla() };
    await saveDB();
  }
  let migrar = false;
  if(!db.grupos){ db.grupos = gruposSemilla(); migrar = true; }
  const existentes = new Set(db.grupos.map(g=>g.dia+'|'+g.horario));
  gruposSemilla().forEach(g=>{
    if(!existentes.has(g.dia+'|'+g.horario)){ db.grupos.push(g); migrar = true; }
  });
  db.inscripciones.forEach(i=>{ if(!i.tipo){ i.tipo='Carrera completa'; migrar = true; } if(i.fechaFin===undefined){ i.fechaFin=null; migrar=true; } });
  db.materias.forEach(m=>{
    if(!m.modalidad){ m.modalidad='Carrera completa'; migrar=true; }
    if(m.fechaInicio===undefined){ m.fechaInicio=''; migrar=true; }
    if(m.fechaFin===undefined){ m.fechaFin=''; migrar=true; }
    if(m.grupoId===undefined){ m.grupoId=''; migrar=true; }
  });
  if(db.planDataVersion !== PLAN_DATA.version){
    db.planesEstudio = PLAN_DATA.planes;
    db.planEventos = PLAN_DATA.eventos;
    db.planDataVersion = PLAN_DATA.version;
    migrar = true;
  }  if(migrar) await saveDB();
  render();
}
async function saveDB(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
  }catch(e){
    console.error('Error guardando', e);
    alert('No se pudo guardar el cambio. Intenta de nuevo.');
  }
}
async function persist(){ await saveDB(); render(); }

function getAlumno(id){ return db.alumnos.find(a=>a.id===id); }
function getMateria(id){ return db.materias.find(m=>m.id===id); }
function getGrupo(id){ return db.grupos.find(g=>g.id===id); }
function grupoLabel(id){ const g=getGrupo(id); return g? g.dia+' · '+g.horario : 'Sin grupo'; }
function inscripcionesDe(alumnoId){ return db.inscripciones.filter(i=>i.alumnoId===alumnoId); }
function inscripcionesMateria(materiaId){ return db.inscripciones.filter(i=>i.materiaId===materiaId); }
function pagosDe(alumnoId){ return db.pagos.filter(p=>p.alumnoId===alumnoId).sort((a,b)=>b.fecha.localeCompare(a.fecha)); }

function esc(s){ const d=document.createElement('div'); d.textContent = s==null?'':s; return d.innerHTML; }

function setView(v, extra){
  state.view = v;
  if(extra) Object.assign(state, extra);
  render();
}

function navItem(id, label){
  const active = state.view===id;
  return `<div class="nav-item ${active?'active':''}" data-nav="${id}"><span class="nav-dot"></span>${label}</div>`;
}

// ---------- DASHBOARD ----------
function viewDashboard(){
  const activos = db.alumnos.filter(a=>a.estado==='activo').length;
  const bajas = db.alumnos.filter(a=>a.estado==='baja').length;
  const mesActual = todayStr().slice(0,7);
  const ingresosMes = db.pagos.filter(p=>p.fecha.slice(0,7)===mesActual).reduce((s,p)=>s+Number(p.monto),0);
  const materiasActivas = db.materias.length;
  const recientes = [...db.alumnos].sort((a,b)=>b.fechaInscripcion.localeCompare(a.fechaInscripcion)).slice(0,5);
  return `
    <h1 class="page-title">Panel general</h1>
    <p class="page-sub">Resumen del instituto al día de hoy</p>
    <div class="grid grid-4" style="margin-bottom:26px;">
      <div class="metric"><div class="metric-label">Alumnos activos</div><div class="metric-value sage">${activos}</div></div>
      <div class="metric"><div class="metric-label">Bajas registradas</div><div class="metric-value">${bajas}</div></div>
      <div class="metric"><div class="metric-label">Materias/seminarios</div><div class="metric-value">${materiasActivas}</div></div>
      <div class="metric"><div class="metric-label">Ingresos del mes</div><div class="metric-value rose">${fmtMoney(ingresosMes)}</div></div>
    </div>
    <div class="card">
      <h3>Altas recientes</h3>
      ${recientes.length===0?'<div class="empty">Todavía no hay alumnos registrados.</div>':`
      <table><thead><tr><th>Alumno</th><th>Fecha de inscripción</th><th>Estado</th></tr></thead><tbody>
        ${recientes.map(a=>`<tr class="clickable" data-open-alumno="${a.id}"><td>${esc(a.nombre)}</td><td>${fmtDate(a.fechaInscripcion)}</td><td><span class="badge ${a.estado}">${a.estado==='activo'?'Activo':'Baja'}</span></td></tr>`).join('')}
      </tbody></table>`}
    </div>
  `;
}

// ---------- ALUMNOS ----------
function viewAlumnos(){
  let lista = db.alumnos;
  if(state.filtroEstado!=='todos') lista = lista.filter(a=>a.estado===state.filtroEstado);
  if(state.searchAlumno) lista = lista.filter(a=>a.nombre.toLowerCase().includes(state.searchAlumno.toLowerCase()));
  lista = [...lista].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  return `
    <h1 class="page-title">Alumnos</h1>
    <p class="page-sub">Control de alumnos activos y bajas</p>
    <div class="toolbar">
      <div style="display:flex;gap:10px;">
        <input class="search-box" id="searchAlumno" placeholder="Buscar por nombre..." value="${esc(state.searchAlumno)}">
        <select class="filter" id="filtroEstado">
          <option value="todos" ${state.filtroEstado==='todos'?'selected':''}>Todos</option>
          <option value="activo" ${state.filtroEstado==='activo'?'selected':''}>Activos</option>
          <option value="baja" ${state.filtroEstado==='baja'?'selected':''}>Bajas</option>
        </select>
      </div>
      <button class="btn" id="btnNuevoAlumno">+ Nuevo alumno</button>
    </div>
    <div class="card" style="padding:0;">
      ${lista.length===0?'<div class="empty">No hay alumnos que coincidan.</div>':`
      <table><thead><tr><th>Nombre</th><th>Teléfono</th><th>Inscripción</th><th>Estado</th><th></th></tr></thead><tbody>
        ${lista.map(a=>`

function viewFicha(){
  const a = getAlumno(state.alumnoDetalle);
  if(!a){ state.alumnoDetalle=null; return viewAlumnos(); }
  const inscs = inscripcionesDe(a.id);
  const pagos = pagosDe(a.id);
  const totalPagado = pagos.reduce((s,p)=>s+Number(p.monto),0);
  return `
    <span class="back-link" id="backAlumnos">← Volver a alumnos</span>
    <div class="ficha-header">
      <div>
        <p class="ficha-name">${esc(a.nombre)}</p>
        <p class="ficha-meta">${esc(a.telefono||'Sin teléfono')} · ${esc(a.email||'Sin correo')} · Inscrito el ${fmtDate(a.fechaInscripcion)}</p>
      </div>
      <div class="row-actions">
        <span class="badge ${a.estado}" style="align-self:center;">${a.estado==='activo'?'Activo':'Baja'}</span>
        <button class="btn small secondary" id="btnEditarFicha">Editar</button>
        ${a.estado==='activo'
          ? `<button class="btn small danger" id="btnDarBaja">Dar de baja</button>`
          : `<button class="btn small secondary" id="btnReactivar">Reactivar</button>`}
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${state.fichaTab==='general'?'active':''}" data-fichatab="general">General</div>
      <div class="tab ${state.fichaTab==='materias'?'active':''}" data-fichatab="materias">Materias</div>
      <div class="tab ${state.fichaTab==='pagos'?'active':''}" data-fichatab="pagos">Pagos</div>
    </div>
    ${state.fichaTab==='general'?fichaGeneral(a,inscs,totalPagado):''}
    ${state.fichaTab==='materias'?fichaMaterias(a,inscs):''}
    ${state.fichaTab==='pagos'?fichaPagos(a,pagos):''}
    ${a.estado==='baja' && state.showBajaModal===undefined ? '' : ''}

function fichaGeneral(a, inscs, totalPagado){
  return `
    <div class="grid grid-4" style="margin-bottom:20px;">
      <div class="metric"><div class="metric-label">Materias inscritas</div><div class="metric-value">${inscs.length}</div></div>
      <div class="metric"><div class="metric-label">Total pagado</div><div class="metric-value sage">${fmtMoney(totalPagado)}</div></div>
      <div class="metric"><div class="metric-label">Estado</div><div class="metric-value ${a.estado==='activo'?'sage':''}">${a.estado==='activo'?'Activo':'Baja'}</div></div>
      <div class="metric"><div class="metric-label">Fecha de baja</div><div class="metric-value" style="font-size:16px;">${a.fechaBaja?fmtDate(a.fechaBaja):'—'}</div></div>
    </div>
    <div class="card">
      <h3>Notas</h3>
      <p style="font-size:14px;color:${a.notas?'var(--ink)':'var(--clay)'};margin:0;">${esc(a.notas)||'Sin notas registradas.'}</p>
    </div>
    ${a.estado==='baja' && a.motivoBaja?`<div class="card"><h3>Motivo de baja</h3><p style="font-size:14px;margin:0;">${esc(a.motivoBaja)}</p></div>`:''}
  `;
}

function fichaMaterias(a, inscs){
  return `
    <div class="toolbar"><div></div><button class="btn" id="btnInscribirMateria">+ Inscribir a materia</button></div>
    ${inscs.length===0?'<div class="card"><div class="empty">Este alumno no está inscrito en ninguna materia todavía.</div></div>':
    inscs.map(i=>{
      const m = getMateria(i.materiaId);
      const cals = i.calificaciones||[];
      const asis = i.asistencias||[];
      const presentes = asis.filter(x=>x.presente).length;
      const pct = asis.length? Math.round(presentes/asis.length*100) : null;
      return `<div class="card">
        <h3 style="display:flex;align-items:center;gap:10px;">${m?esc(m.nombre):'Materia eliminada'} <span class="badge ${i.tipo==='Diplomado'?'diplomado':'carrera'}">${esc(i.tipo||'Carrera completa')}</span></h3>
        <p class="note" style="margin-top:-8px;margin-bottom:12px;">${esc(grupoLabel(i.grupoId))} · Del ${fmtDate(i.fechaInscripcion)} ${i.fechaFin?'al '+fmtDate(i.fechaFin):'(sin fecha de fin)'} · Asistencia: ${pct===null?'sin registros':pct+'% ('+presentes+'/'+asis.length+')'}</p>
        ${cals.length===0?'<p class="note">Sin calificaciones registradas.</p>':
        `<table><thead><tr><th>Examen / concepto</th><th>Fecha</th><th>Calificación</th></tr></thead><tbody>
          ${cals.map(c=>`<tr><td>${esc(c.concepto)}</td><td>${fmtDate(c.fecha)}</td><td><strong>${esc(c.nota)}</strong></td></tr>`).join('')}
        </tbody></table>`}
      </div>`;
    }).join('')}
  `;
}

function fichaPagos(a, pagos){
  const total = pagos.reduce((s,p)=>s+Number(p.monto),0);
  return `
    <div class="toolbar"><div class="metric" style="border:none;padding:0;"><div class="metric-label">Total histórico</div><div class="metric-value rose">${fmtMoney(total)}</div></div><button class="btn" id="btnNuevoPagoFicha">+ Registrar pago</button></div>
    <div class="card" style="padding:0;">
      ${pagos.length===0?'<div class="empty">Sin pagos registrados.</div>':`
      <table><thead><tr><th>Fecha</th><th>Concepto</th><th>Método</th><th>Monto</th></tr></thead><tbody>
        ${pagos.map(p=>`<tr><td>${fmtDate(p.fecha)}</td><td>${esc(p.concepto)}</td><td>${esc(p.metodo)}</td><td><strong>${fmtMoney(p.monto)}</strong></td></tr>`).join('')}
      </tbody></table>`}
    </div>
  `;
}

// ---------- CALENDARIO ACADÉMICO ----------
function modalidadClass(tipo){ return tipo==='Diplomado'?'diplomado':tipo==='Seminario'?'seminario':tipo==='Curso de verano'?'verano':tipo==='Evento especial'?'evento':'carrera'; }
function modalidadColor(tipo){ return tipo==='Diplomado'?'#ec198e':tipo==='Seminario'?'#2687ba':tipo==='Curso de verano'?'#e59a22':tipo==='Evento especial'?'#666065':'#7c48ad'; }
function viewCalendario(){
  const filtro = state.calendarioFiltro || 'Todas';
  const planFiltro = state.planFiltro || 'Todos';
  const importadas = (db.planEventos||[]).map(e=>({
    ...e, nombre:e.titulo, grupoTexto:e.grupos.join(' · '),
    duracion:e.semanas===1?'1 semana':`${e.semanas} semanas`
  }));
  const manuales = db.materias.filter(m=>m.fechaInicio && m.fechaFin).map(m=>({
    ...m, planId:'manual', grupoTexto:grupoLabel(m.grupoId)
  }));
  const programadas = [...importadas,...manuales]
    .filter(m=>filtro==='Todas' || m.modalidad===filtro)
    .filter(m=>planFiltro==='Todos' || m.planId===planFiltro)
    .sort((a,b)=>a.fechaInicio.localeCompare(b.fechaInicio));
  const modalidades=['Todas','Carrera completa','Diplomado','Seminario','Curso de verano','Evento especial'];
  const planActual=(db.planesEstudio||[]).find(p=>p.id===planFiltro);
  return `
    <h1 class="page-title">Calendario académico</h1>
    <p class="page-sub">Plan de estudios oficial de Ciudad Guzmán, organizado por ciclo, grupo y modalidad.</p>
    <div class="card" style="padding:16px 18px;">
      <div class="toolbar" style="margin:0;">
        <div><strong>Plan o calendario</strong><div class="note">Selecciona un ciclo para revisar todas sus materias.</div></div>
        <select class="filter" id="selPlanCalendario">
          <option value="Todos">Todos los planes</option>
          ${(db.planesEstudio||[]).map(p=>`<option value="${p.id}" ${planFiltro===p.id?'selected':''}>${esc(p.nombre)}</option>`).join('')}
          <option value="manual" ${planFiltro==='manual'?'selected':''}>Programación manual</option>
        </select>
      </div>
      ${planActual?`<div class="plan-summary"><span>${esc(planActual.sede)}</span><span>Ciclo ${esc(planActual.ciclo)}</span><span>${planActual.grupos.length} grupos</span></div>`:''}
    </div>
    <div class="calendar-toolbar">
      ${modalidades.map(x=>`<button class="calendar-filter ${filtro===x?'active':''}" data-cal-filter="${x}">${x}</button>`).join('')}
    </div>
    <div class="card">
      <div class="calendar-count">${programadas.length} bloques académicos encontrados</div>
      ${programadas.length===0?'<div class="empty">No hay actividades programadas para este filtro.</div>':`
      <div class="calendar-list">${programadas.map(m=>`
        <div class="calendar-event" style="--event-color:${modalidadColor(m.modalidad)}">
          <div class="calendar-date">${fmtDate(m.fechaInicio)}<br><span style="font-weight:500;color:var(--clay)">al ${fmtDate(m.fechaFin)}</span></div>
          <div><div class="calendar-title">${esc(m.nombre)}</div><div class="calendar-meta">${esc(m.grupoTexto||'Sin grupo')} · ${esc(m.duracion||'Duración según fechas')}</div></div>
          <span class="badge ${modalidadClass(m.modalidad)}">${esc(m.modalidad)}</span>
        </div>`).join('')}</div>`}
    </div>`;
}

      ${db.materias.length===0?'<div class="empty">Primero crea una materia en la sección "Materias".</div>':
      inscs.length===0?'<div class="empty">No hay alumnos inscritos en esta materia todavía.</div>':`
      <table><thead><tr><th>Alumno</th><th>Última calificación</th><th># de notas</th><th></th></tr></thead><tbody>
        ${inscs.map(i=>{
          const al = getAlumno(i.alumnoId);
          const cals = i.calificaciones||[];
          const ultima = cals.length? cals[cals.length-1] : null;
          return `<tr>
            <td>${al?esc(al.nombre):'—'}</td>
            <td>${ultima?esc(ultima.concepto)+': '+esc(ultima.nota):'—'}</td>
            <td>${cals.length}</td>
            <td style="text-align:right;"><button class="btn small secondary" data-agregar-cal="${i.id}">+ Agregar calificación</button></td>
          </tr>`;
        }).join('')}
      </tbody></table>`}
    </div>
    ${modalCalificacionHTML()}
  `;
}

function modalCalificacionHTML(){
  if(!state.showModalCal) return '';
  const i = db.inscripciones.find(x=>x.id===state.calInscripcionId);
  const al = i?getAlumno(i.alumnoId):null;
  return `
  <div class="overlay" id="overlayCal">

      <h2>Nueva calificación — ${al?esc(al.nombre):''}</h2>

// ---------- ASISTENCIA ----------
function viewAsistencia(){
  const materiaSel = state.asistenciaMateria || (db.materias[0] && db.materias[0].id) || '';
  const fecha = state.asistenciaFecha || todayStr();
  let inscs = materiaSel ? inscripcionesMateria(materiaSel) : [];
  const gruposEnUso = [...new Set(inscs.map(i=>i.grupoId || '__none__'))];
  const grupoSel = state.asistenciaGrupo!==undefined ? state.asistenciaGrupo : '';
  if(grupoSel) inscs = inscs.filter(i=>(i.grupoId||'__none__')===grupoSel);
  return `
    <h1 class="page-title">Asistencia</h1>
    <p class="page-sub">Pasa lista por materia, grupo y fecha</p>
    <div class="toolbar">
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <select class="filter" id="selAsisMateria">
          ${db.materias.length===0?'<option value="">No hay materias</option>':db.materias.map(m=>`<option value="${m.id}" ${m.id===materiaSel?'selected':''}>${esc(m.nombre)}</option>`).join('')}
        </select>
        <select class="filter" id="selAsisGrupo">
          <option value="">Todos los grupos</option>
          ${gruposEnUso.map(gid=>`<option value="${gid}" ${gid===grupoSel?'selected':''}>${esc(gid==='__none__'?'Sin grupo asignado':grupoLabel(gid))}</option>`).join('')}
        </select>
        <input type="date" class="search-box" id="fechaAsistencia" value="${fecha}">
      </div>
    </div>
    <div class="card">
      ${db.materias.length===0?'<div class="empty">Primero crea una materia.</div>':
      inscs.length===0?'<div class="empty">No hay alumnos inscritos en esta materia (o grupo).</div>':`
      <div class="att-grid">
        ${inscs.map(i=>{
          const al = getAlumno(i.alumnoId);
          const reg = (i.asistencias||[]).find(x=>x.fecha===fecha);
          const val = reg ? (reg.presente?'p':'a') : '';
          return `<div class="att-row">
            <div><div>${al?esc(al.nombre):'—'}</div><div class="note" style="margin-top:2px;">${esc(grupoLabel(i.grupoId))}</div></div>
            <div class="toggle">
              <button class="${val==='p'?'on-p':''}" data-asis="${i.id}" data-presente="true">Presente</button>
              <button class="${val==='a'?'on-a':''}" data-asis="${i.id}" data-presente="false">Ausente</button>
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>
  `;
}

// ---------- PAGOS ----------

  let pagos = [...db.pagos].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(state.pagosFiltro) pagos = pagos.filter(p=>{ const al=getAlumno(p.alumnoId); return al && al.nombre.toLowerCase().includes(state.pagosFiltro.toLowerCase()); });
  const total = pagos.reduce((s,p)=>s+Number(p.monto),0);
  return `
    <h1 class="page-title">Pagos</h1>
    <p class="page-sub">Historial de pagos de todos los alumnos</p>
    <div class="toolbar">
      <input class="search-box" id="searchPagos" placeholder="Filtrar por alumno..." value="${esc(state.pagosFiltro)}">
      <button class="btn" id="btnNuevoPagoGlobal">+ Registrar pago</button>
    </div>
    <div class="card" style="padding:0;">
      ${pagos.length===0?'<div class="empty">Sin pagos registrados.</div>':`

        ${pagos.map(p=>{ const al=getAlumno(p.alumnoId); return `<tr class="clickable" data-open-alumno="${p.alumnoId}">
          <td>${fmtDate(p.fecha)}</td><td>${al?esc(al.nombre):'Alumno eliminado'}</td><td>${esc(p.concepto)}</td><td>${esc(p.metodo)}</td><td><strong>${fmtMoney(p.monto)}</strong></td>

// ---------- EVENT HANDLERS ----------

function exportarRespaldo(){
  const contenido = JSON.stringify({ version:1, exportadoEn:new Date().toISOString(), datos:db }, null, 2);
  const blob = new Blob([contenido], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const enlace = document.createElement('a');
  enlace.href = url;
  enlace.download = `ise-respaldo-${todayStr()}.json`;
  document.body.appendChild(enlace);
  enlace.click();
  enlace.remove();
  URL.revokeObjectURL(url);
}

async function importarRespaldo(archivo){
  try{
    const contenido = await archivo.text();
    const parsed = JSON.parse(contenido);
    const datos = parsed.datos || parsed;
    const claves = ['alumnos','materias','inscripciones','pagos','grupos'];
    if(!datos || !claves.every(k=>Array.isArray(datos[k]))) throw new Error('Formato inválido');
    if(!confirm('Esto reemplazará los datos actuales. ¿Deseas continuar?')) return;
    db = datos;
    await saveDB();
    state = { view:'dashboard', alumnoDetalle:null, fichaTab:'general', asistenciaMateria:'', asistenciaFecha:'', pagosFiltro:'', searchAlumno:'', filtroEstado:'todos' };
    render();
    alert('Respaldo importado correctamente.');
  }catch(e){
    console.error(e);
    alert('El archivo no es un respaldo válido de ISE.');
  }
}

  const btnCancelarBaja = document.getElementById('btnCancelarBaja');
  if(btnCancelarBaja) btnCancelarBaja.onclick = ()=>{ state.showBajaModal=false; render(); };
  const btnConfirmarBaja = document.getElementById('btnConfirmarBaja');

    a.motivoBaja = document.getElementById('fMotivoBaja').value.trim();

  const btnReactivar = document.getElementById('btnReactivar');
  if(btnReactivar) btnReactivar.onclick = async ()=>{
    const a = getAlumno(state.alumnoDetalle);
    a.estado='activo'; a.fechaBaja=null; a.motivoBaja='';

  };

  const btnInscribirMateria = document.getElementById('btnInscribirMateria');
  if(btnInscribirMateria) btnInscribirMateria.onclick = ()=>{ state.showModalInscripcion=true; render(); };
  const overlayInscripcion = document.getElementById('overlayInscripcion');
  if(overlayInscripcion) overlayInscripcion.onclick = e=>{ if(e.target.id==='overlayInscripcion'){ state.showModalInscripcion=false; render(); } };
  const btnCancelarInscripcion = document.getElementById('btnCancelarInscripcion');
  if(btnCancelarInscripcion) btnCancelarInscripcion.onclick = ()=>{ state.showModalInscripcion=false; render(); };
  const btnConfirmarInscripcion = document.getElementById('btnConfirmarInscripcion');
  if(btnConfirmarInscripcion) btnConfirmarInscripcion.onclick = async ()=>{
    const materiaId = document.getElementById('fMateriaInsc').value;
    const grupoId = document.getElementById('fGrupoInsc').value || null;
    const tipo = document.getElementById('fTipoInsc').value;
    const fechaInscripcion = document.getElementById('fFechaInsc').value || todayStr();
    const fechaFin = document.getElementById('fFinInsc').value || null;
    db.inscripciones.push({ id: uid('ins'), alumnoId: state.alumnoDetalle, materiaId, grupoId, tipo, fechaInscripcion, fechaFin, calificaciones:[], asistencias:[] });

    await persist();
  };

  const btnNuevoPagoFicha = document.getElementById('btnNuevoPagoFicha');
  if(btnNuevoPagoFicha) btnNuevoPagoFicha.onclick = ()=>{ state.showModalPago=true; render(); };

  if(overlayPago) overlayPago.onclick = e=>{ if(e.target.id==='overlayPago'){ state.showModalPago=false; render(); } };
  const btnCancelarPago = document.getElementById('btnCancelarPago');
  if(btnCancelarPago) btnCancelarPago.onclick = ()=>{ state.showModalPago=false; render(); };
  const btnConfirmarPago = document.getElementById('btnConfirmarPago');
  if(btnConfirmarPago) btnConfirmarPago.onclick = async ()=>{
    const monto = parseFloat(document.getElementById('fMontoPago').value);
    const concepto = document.getElementById('fConceptoPago').value.trim();
    if(!concepto || !monto){ alert('Completa concepto y monto.'); return; }
    db.pagos.push({ id: uid('pg'), alumnoId: state.alumnoDetalle, concepto, monto, fecha: document.getElementById('fFechaPago').value||todayStr(), metodo: document.getElementById('fMetodoPago').value });
    state.showModalPago=false;
    await persist();
  };

  // Materias
  const btnNuevaMateria = document.getElementById('btnNuevaMateria');
  if(btnNuevaMateria) btnNuevaMateria.onclick = ()=>{ state.showModalMateria=true; state.editMateria=null; render(); };
  document.querySelectorAll('[data-editar-materia]').forEach(el=>{
    el.onclick = ()=>{ state.showModalMateria=true; state.editMateria=getMateria(el.dataset.editarMateria); render(); };
  });
  document.querySelectorAll('[data-eliminar-materia]').forEach(el=>{
    el.onclick = async ()=>{
      if(confirm('¿Eliminar esta materia? También se eliminarán sus inscripciones, calificaciones y asistencias.')){
        const id = el.dataset.eliminarMateria;
        db.materias = db.materias.filter(m=>m.id!==id);
        db.inscripciones = db.inscripciones.filter(i=>i.materiaId!==id);
        await persist();
      }
    };
  });
  const overlayMateria = document.getElementById('overlayMateria');
  if(overlayMateria) overlayMateria.onclick = e=>{ if(e.target.id==='overlayMateria'){ state.showModalMateria=false; render(); } };
  const btnCancelarMateria = document.getElementById('btnCancelarMateria');
  if(btnCancelarMateria) btnCancelarMateria.onclick = ()=>{ state.showModalMateria=false; render(); };
  const btnGuardarMateria = document.getElementById('btnGuardarMateria');
  if(btnGuardarMateria) btnGuardarMateria.onclick = async ()=>{
    const nombre = document.getElementById('fNombreMateria').value.trim();

    const duracion = document.getElementById('fDuracionMateria').value.trim();

    el.onclick = async ()=>{
      const i = db.inscripciones.find(x=>x.id===el.dataset.asis);
      const fecha = state.asistenciaFecha || todayStr();
      const presente = el.dataset.presente === 'true';
      i.asistencias = i.asistencias||[];
      const existing = i.asistencias.find(x=>x.fecha===fecha);
      if(existing) existing.presente = presente;
      else i.asistencias.push({fecha, presente});

    };
  });

  const searchPagos = document.getElementById('searchPagos');
  if(searchPagos) searchPagos.oninput = e=>{ state.pagosFiltro = e.target.value; render(); document.getElementById('searchPagos').focus(); document.getElementById('searchPagos').setSelectionRange(999,999); };
  const btnNuevoPagoGlobal = document.getElementById('btnNuevoPagoGlobal');
  if(btnNuevoPagoGlobal) btnNuevoPagoGlobal.onclick = ()=>{ state.showModalPagoGlobal=true; render(); };
  const overlayPagoGlobal = document.getElementById('overlayPagoGlobal');
  if(overlayPagoGlobal) overlayPagoGlobal.onclick = e=>{ if(e.target.id==='overlayPagoGlobal'){ state.showModalPagoGlobal=false; render(); } };
  const btnCancelarPagoGlobal = document.getElementById('btnCancelarPagoGlobal');
  if(btnCancelarPagoGlobal) btnCancelarPagoGlobal.onclick = ()=>{ state.showModalPagoGlobal=false; render(); };
  const btnConfirmarPagoGlobal = document.getElementById('btnConfirmarPagoGlobal');
  if(btnConfirmarPagoGlobal) btnConfirmarPagoGlobal.onclick = async ()=>{
    if(db.alumnos.length===0){ alert('Primero registra un alumno.'); return; }
    const alumnoId = document.getElementById('fAlumnoPago').value;
    const concepto = document.getElementById('fConceptoPagoG').value.trim();
    const monto = parseFloat(document.getElementById('fMontoPagoG').value);
    if(!concepto || !monto){ alert('Completa concepto y monto.'); return; }
    db.pagos.push({ id: uid('pg'), alumnoId, concepto, monto, fecha: document.getElementById('fFechaPagoG').value||todayStr(), metodo: document.getElementById('fMetodoPagoG').value });
    state.showModalPagoGlobal=false;
    await persist();
  };
}

loadDB();
</script>
</body>
</html>
